name: Osvježi i objavi Kvadrat

on:
  push:
    branches: [main]
    paths-ignore:
      - public/data.json
  schedule:
    - cron: "0 9,17 * * *"
      timezone: "Europe/Zagreb"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Preuzmi projekt
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Postavi Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Instaliraj ovisnosti
        run: npm ci

      - name: Osvježi oglase
        run: npm run sync:static

      - name: Pokreni testove
        run: npm test

      - name: Spremi novi data.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          if ! git diff --cached --quiet; then
            git commit -m "Automatsko osvježavanje oglasa"
            git pull --rebase origin main
            git push
          fi

      - name: Pripremi GitHub Pages
        uses: actions/configure-pages@v5

      - name: Zapakiraj stranicu
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Objavi stranicu
        id: deployment
        uses: actions/deploy-pages@v4
